<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍽️ 美食偏好管理</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --likes: #e05041;
  --likes-light: #ffe8e4;
  --likes-dark: #c0392b;
  --dislikes: #e0932d;
  --dislikes-light: #fff3e0;
  --dislikes-dark: #b8731b;
  --allergies: #d15252;
  --allergies-light: #ffeaea;
  --allergies-dark: #a83232;
  --bg: #fffaf5;
  --bg-card: #ffffff;
  --text: #3d2c1e;
  --text-secondary: #8b6f5c;
  --text-muted: #b8a090;
  --shadow: 0 4px 20px rgba(61, 44, 30, 0.07);
  --shadow-hover: 0 6px 28px rgba(61, 44, 30, 0.12);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --font-xl: clamp(2rem, 5vw, 2.8rem);
  --font-lg: clamp(1.3rem, 3.5vw, 1.6rem);
  --font-md: clamp(1rem, 2.5vw, 1.15rem);
  --font-sm: clamp(0.85rem, 2vw, 0.95rem);
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* ===== App Wrapper ===== */
.app-wrapper {
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* ===== View Switching ===== */
.view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  overflow-y: auto;
}
.view.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===== Login View ===== */
.login-view {
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background: var(--bg);
  gap: 20px;
}
.login-view .login-icon {
  font-size: 64px;
  animation: bounce 2s ease infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.login-view h1 {
  font-size: var(--font-xl);
  color: var(--text);
  letter-spacing: 2px;
  text-align: center;
}
.login-view .login-subtitle {
  font-size: var(--font-sm);
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 4px;
}
.login-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.login-card label {
  font-size: var(--font-sm);
  font-weight: 600;
  color: var(--text-secondary);
}
.login-card .form-input {
  width: 100%;
  padding: 16px 18px;
  border-radius: var(--radius-xs);
  border: 2px solid #e8dbce;
  font-size: var(--font-md);
  font-family: inherit;
  background: #fdfcfb;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  margin-top: 4px;
}
.login-card .form-input:focus { border-color: var(--dislikes); }
.login-error {
  color: var(--allergies);
  font-size: var(--font-sm);
  text-align: center;
  min-height: 20px;
  font-weight: 500;
}
.btn-login {
  width: 100%;
  padding: 16px;
  border-radius: 50px;
  border: none;
  background: var(--likes);
  color: #fff;
  font-size: var(--font-md);
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-login:hover { background: var(--likes-dark); }
.btn-login:active { transform: scale(0.97); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-footer {
  text-align: center;
  font-size: var(--font-sm);
}
.login-footer a {
  color: var(--dislikes-dark);
  cursor: pointer;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}
.login-footer a:hover { color: var(--dislikes); }

/* ===== Main View ===== */
.main-view { overflow-y: auto; }

/* ===== App Container ===== */
.app {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 30px 0 10px;
}
.header .icon {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.header h1 {
  font-size: var(--font-xl);
  color: var(--text);
  letter-spacing: 2px;
  margin-top: 6px;
}
.header .subtitle {
  font-size: var(--font-sm);
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== User Bar ===== */
.user-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 6px 0 10px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.user-bar .user-email {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}
.user-bar .logout-btn {
  background: none;
  border: 1px solid var(--text-muted);
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: inherit;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.user-bar .logout-btn:hover {
  border-color: var(--allergies);
  color: var(--allergies);
}

/* ===== Sync indicator ===== */
.sync-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-muted);
  height: 24px;
  transition: opacity 0.3s;
}
.sync-bar .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5a9e6f;
  transition: background 0.3s;
}
.sync-bar.syncing .dot { background: #e0932d; animation: pulse 0.8s ease infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ===== Category Card ===== */
.category {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px 24px 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.3s ease;
  border: 2px solid transparent;
}
.category:hover {
  box-shadow: var(--shadow-hover);
}
.category.likes  { border-color: var(--likes-light); }
.category.dislikes { border-color: var(--dislikes-light); }
.category.allergies { border-color: var(--allergies-light); }

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.category-header .cat-icon {
  font-size: 28px;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.category.likes .cat-icon  { background: var(--likes-light); }
.category.dislikes .cat-icon { background: var(--dislikes-light); }
.category.allergies .cat-icon { background: var(--allergies-light); }

.category-header .cat-title {
  font-size: var(--font-lg);
  font-weight: 700;
  letter-spacing: 1px;
}
.category.likes .cat-title  { color: var(--likes-dark); }
.category.dislikes .cat-title { color: var(--dislikes-dark); }
.category.allergies .cat-title { color: var(--allergies-dark); }

.category-header .cat-count {
  font-size: var(--font-sm);
  color: var(--text-muted);
  font-weight: 500;
  margin-left: auto;
}

/* ===== Chips Container ===== */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 36px;
}

/* ===== Food Chip ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 8px 16px;
  border-radius: 50px;
  font-size: var(--font-sm);
  font-weight: 500;
  background: #f5f0eb;
  color: var(--text);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  cursor: default;
  animation: chipIn 0.3s ease;
}
.chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}
.chip .delete-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.08);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.chip .delete-btn:hover {
  background: var(--allergies);
  color: #fff;
}

@keyframes chipIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}

.chip.removing {
  animation: chipOut 0.25s ease forwards;
}
@keyframes chipOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.6); }
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 18px 0 8px;
  color: var(--text-muted);
  font-size: var(--font-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.empty-state .empty-icon {
  font-size: 32px;
  opacity: 0.5;
}

/* ===== Add Row ===== */
.add-row {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 18px;
  border-radius: 50px;
  border: 2px dashed var(--text-muted);
  background: transparent;
  color: var(--text-muted);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text-secondary);
  background: rgba(0,0,0,0.02);
}
.add-btn .plus {
  font-size: 18px;
  font-weight: 300;
  line-height: 1;
}

/* ===== Inline Add Form ===== */
.add-form {
  display: none;
  align-items: center;
  gap: 8px;
  width: 100%;
  animation: formIn 0.25s ease;
}
.add-form.active { display: flex; }
@keyframes formIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.add-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid #e0d7ce;
  font-size: var(--font-sm);
  font-family: inherit;
  background: #fdfcfb;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  max-width: 260px;
}
.add-input:focus {
  border-color: var(--likes);
}
.category.dislikes .add-input:focus { border-color: var(--dislikes); }
.category.allergies .add-input:focus { border-color: var(--allergies); }

.form-confirm, .form-cancel {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.form-confirm:active, .form-cancel:active { transform: scale(0.9); }

.form-confirm {
  background: #5a9e6f;
  color: #fff;
}
.form-confirm:hover { background: #4a8d5f; }

.form-cancel {
  background: #e8e0d8;
  color: var(--text-secondary);
}
.form-cancel:hover { background: #d8cfc5; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: #3d2c1e; color: #fff; padding: 14px 28px;
  border-radius: 50px; font-size: var(--font-sm); font-weight: 600;
  z-index: 200; pointer-events: none;
  transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== Summary Footer ===== */
.footer-summary {
  text-align: center;
  padding: 8px 0 30px;
  font-size: var(--font-sm);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-summary span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .app { padding: 16px 12px 60px; }
  .category { padding: 18px 16px 14px; margin-bottom: 14px; }
  .category-header { margin-bottom: 12px; }
  .category-header .cat-icon { width: 38px; height: 38px; font-size: 24px; border-radius: 12px; }
  .chips { gap: 8px; }
  .chip { padding: 7px 10px 7px 14px; font-size: 0.9rem; }
  .add-input { max-width: 180px; padding: 9px 14px; }
  .header { padding: 16px 0 4px; }
  .header .icon { font-size: 40px; }
  .login-card { padding: 24px 18px; gap: 14px; }
  .login-view .login-icon { font-size: 48px; }
}

@media (max-width: 360px) {
  .app { padding: 12px 8px 60px; }
  .category { padding: 14px 12px 10px; }
  .add-input { max-width: 140px; }
  .login-card { padding: 20px 14px; }
}
</style>
</head>

            <button class="form-cancel" onclick="cancelAdd('likes')" title="取消">✕</button>
          </div>
        </div>
      </div>

      <!-- Category: Dislikes -->
      <div class="category dislikes" id="cat-dislikes">
        <div class="category-header">
          <div class="cat-icon">👎</div>
          <span class="cat-title">不喜欢吃</span>
          <span class="cat-count" id="count-dislikes">0</span>
        </div>
        <div class="chips" id="chips-dislikes"></div>
        <div class="empty-state" id="empty-dislikes">
          <span class="empty-icon">🥬</span>
          <span>还没有记录，点击下方添加吧</span>
        </div>
        <div class="add-row" id="addRow-dislikes">
          <button class="add-btn" id="addBtn-dislikes" onclick="showAddForm('dislikes')">
            <span class="plus">+</span> 添加不喜欢
          </button>
          <div class="add-form" id="addForm-dislikes">
            <input class="add-input" id="addInput-dislikes" type="text" placeholder="输入食物名称…" maxlength="50">
            <button class="form-confirm" onclick="confirmAdd('dislikes')" title="确认">✓</button>
            <button class="form-cancel" onclick="cancelAdd('dislikes')" title="取消">✕</button>
          </div>
        </div>
      </div>

      <!-- Category: Allergies -->
      <div class="category allergies" id="cat-allergies">
        <div class="category-header">
          <div class="cat-icon">⚠️</div>
          <span class="cat-title">过敏</span>
          <span class="cat-count" id="count-allergies">0</span>
        </div>
        <div class="chips" id="chips-allergies"></div>
        <div class="empty-state" id="empty-allergies">
          <span class="empty-icon">🫘</span>
          <span>还没有记录，点击下方添加吧</span>
        </div>
        <div class="add-row" id="addRow-allergies">
          <button class="add-btn" id="addBtn-allergies" onclick="showAddForm('allergies')">
            <span class="plus">+</span> 添加过敏
          </button>
          <div class="add-form" id="addForm-allergies">
            <input class="add-input" id="addInput-allergies" type="text" placeholder="输入食物名称…" maxlength="50">
            <button class="form-confirm" onclick="confirmAdd('allergies')" title="确认">✓</button>
            <button class="form-cancel" onclick="cancelAdd('allergies')" title="取消">✕</button>
          </div>
        </div>
      </div>

      <!-- Footer summary -->
      <div class="footer-summary" id="footerSummary"></div>
    </div>
  </div>

</div><!-- /.app-wrapper -->

<!-- Toast -->
<div class="toast" id="toast"></div>

    currentUser = user;
    $('#userEmail').textContent = user.email;
    loginView.classList.remove('active');
    mainView.classList.add('active');
  }

  // ============================
  //  Auth
  // ============================
  const loginEmail = $('#loginEmail');
  const loginPassword = $('#loginPassword');
  const loginError = $('#loginError');
  const loginBtn = $('#loginBtn');
  const showSignupLink = $('#showSignupLink');

  window.toggleSignupMode = function() {
    signupMode = !signupMode;
    if (signupMode) {
      loginBtn.textContent = '🔑 注册';
      showSignupLink.textContent = '已有账号？去登录';
      loginError.textContent = '';
    } else {
      loginBtn.textContent = '🔐 登录';
      showSignupLink.textContent = '首次使用？创建账号';
      loginError.textContent = '';
    }
  };

  async function doLogin() {
    const email = loginEmail.value.trim();
    const password = loginPassword.value.trim();

    if (!email) { loginError.textContent = '请输入邮箱地址'; return; }
    if (!password) { loginError.textContent = '请输入密码'; return; }
    if (password.length < 6) { loginError.textContent = '密码至少6位'; return; }

    loginBtn.disabled = true;
    loginError.textContent = '';

    try {
      if (signupMode) {
        // Sign up
        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { emailRedirectTo: window.location.href }
        });
        if (error) throw error;
        if (data.user) {
          showToast('✅ 账号创建成功！');
          signupMode = false;
          loginBtn.textContent = '🔐 登录';
          showSignupLink.textContent = '首次使用？创建账号';
          loginError.textContent = '';
        }
      }

      // Sign in
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;

      onLoginSuccess(data.user);
    } catch (err) {
      loginError.textContent = getAuthErrorMessage(err);
    } finally {
      loginBtn.disabled = false;
    }
  }

  function getAuthErrorMessage(err) {
    const msg = err.message || String(err);
    if (msg.includes('Invalid login credentials') || msg.includes('Invalid Login'))
      return '邮箱或密码错误，请重试';
    if (msg.includes('Email not confirmed'))
      return '邮箱尚未验证，请先确认邮箱';
    if (msg.includes('User already registered') || msg.includes('already been registered'))
      return '该邮箱已注册，请直接登录';
    if (msg.includes('password') && msg.includes('weak'))
      return '密码太弱，请使用6位以上密码';
    if (msg.includes('valid email'))
      return '请输入有效的邮箱地址';
    if (msg.includes('rate') || msg.includes('limit'))
      return '请求太频繁，请稍后再试';
    if (msg.includes('network') || msg.includes('fetch'))
      return '网络连接失败，请检查网络';
    return `登录失败：${msg}`;
  }

  async function onLoginSuccess(user) {
    loginError.textContent = '';
    loginPassword.value = '';
    loginBtn.disabled = false;

    switchToMain(user);

    // Load data and subscribe
    try {
      setSyncStatus(true);
      foodItems = await loadFoodItems();
      renderAll();
      subscribeToChanges();
      setSyncStatus(false);
      console.log(`🍽️ 美食偏好管理已就绪 | ${foodItems.length} 项食物`);
    } catch (e) {
      console.error('Failed to load after login:', e);
      renderAll();
      setSyncStatus(false);
      showToast('数据加载失败，请刷新重试', 3000);
    }
  }

  async function doLogout() {
    if (!confirm('确定要退出登录吗？')) return;

    if (realtimeChannel) {
      supabase.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }
    await supabase.auth.signOut();
    currentUser = null;
    foodItems = [];
    switchToLogin();
  }

  // Expose to global scope for onclick handlers
  window.doLogout = doLogout;

  // Login button event
  loginBtn.addEventListener('click', doLogin);

  // Enter key to login
  loginPassword.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
  loginEmail.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  // ============================
  //  Supabase Operations
  // ============================
  async function loadFoodItems() {
    const { data, error } = await supabase
      .from('food_items')
      .select('*')
      .order('sort_order', { ascending: true });

    if (error) {
      console.error('Failed to load food items:', error);
      return [];
    }
    return data || [];
  }

  async function addFoodItem(name, category) {
    const itemsInCategory = foodItems.filter(f => f.category === category);
    const nextOrder = itemsInCategory.length > 0
      ? Math.max(...itemsInCategory.map(f => f.sort_order)) + 1
      : 0;

    const { data, error } = await supabase
      .from('food_items')
      .insert({ name, category, sort_order: nextOrder })
      .select()
      .single();

    if (error) {
      console.error('Failed to add food item:', error);
      throw error;
    }
    return data;
  }

  async function deleteFoodItem(id) {
    const { error } = await supabase
      .from('food_items')
      .delete()
      .eq('id', id);

    if (error) {
      console.error('Failed to delete food item:', error);
      throw error;
    }
  }

  // ============================
  //  Realtime
  // ============================
  function subscribeToChanges() {
    if (realtimeChannel) {
      supabase.removeChannel(realtimeChannel);
    }

    realtimeChannel = supabase
      .channel('food-items-changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'food_items' },
        async () => {
          setSyncStatus(true);
          foodItems = await loadFoodItems();
          renderAll();
          setTimeout(() => setSyncStatus(false), 600);
        }
      )
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log('✅ Realtime subscribed to food_items');
        }
      });
  }

  function setSyncStatus(syncing) {
    const bar = $('#syncBar');
    const text = $('#syncText');
    if (syncing) {
      bar.classList.add('syncing');
      text.textContent = '同步中…';
    } else {
      bar.classList.remove('syncing');
      text.textContent = '已同步';
    }
  }

  // ============================
  //  Rendering
  // ============================
  function renderAll() {
    const categories = ['likes', 'dislikes', 'allergies'];
    for (const cat of categories) {
      const items = foodItems.filter(f => f.category === cat);
      renderCategory(cat, items);
    }
    renderFooterSummary();
  }

  function renderCategory(category, items) {
    const chipsContainer = $(`#chips-${category}`);
    const emptyEl = $(`#empty-${category}`);
    const countEl = $(`#count-${category}`);
    const addRow = $(`#addRow-${category}`);

    countEl.textContent = items.length > 0 ? `${items.length} 项` : '';

    if (items.length === 0) {
      emptyEl.style.display = 'flex';
    } else {
      emptyEl.style.display = 'none';
    }

    chipsContainer.innerHTML = items.map(item => `
      <span class="chip" data-id="${item.id}">
        ${escapeHtml(item.name)}
        <button class="delete-btn" onclick="handleDelete('${item.id}', '${escapeHtml(item.name).replace(/'/g, "\\'")}')" title="删除">✕</button>
      </span>
    `).join('');

    chipsContainer.appendChild(addRow);
  }

  function renderFooterSummary() {
    const likes = foodItems.filter(f => f.category === 'likes').length;
    const dislikes = foodItems.filter(f => f.category === 'dislikes').length;
    const allergies = foodItems.filter(f => f.category === 'allergies').length;
    const total = foodItems.length;

    const footer = $('#footerSummary');
    if (total === 0) {
      footer.innerHTML = '<span>📝 开始记录朋友的美食偏好吧</span>';
    } else {
      footer.innerHTML = `
        <span>❤️ ${likes} 爱吃</span>
        <span>👎 ${dislikes} 不吃</span>
        <span>⚠️ ${allergies} 过敏</span>
        <span>📋 共 ${total} 项</span>
      `;
    }
  }

  // ============================
  //  Add Form Logic
  // ============================
  function showAddForm(category) {
    const allForms = document.querySelectorAll('.add-form');
    const allBtns = document.querySelectorAll('.add-btn');
    allForms.forEach(f => f.classList.remove('active'));
    allBtns.forEach(b => b.style.display = '');

    const btn = $(`#addBtn-${category}`);
    const form = $(`#addForm-${category}`);
    const input = $(`#addInput-${category}`);

    btn.style.display = 'none';
    form.classList.add('active');
    input.value = '';
    input.focus();
    currentAddCategory = category;
  }

  function cancelAdd(category) {
    const btn = $(`#addBtn-${category}`);
    const form = $(`#addForm-${category}`);
    const input = $(`#addInput-${category}`);

    form.classList.remove('active');
    input.value = '';
    btn.style.display = '';
    currentAddCategory = null;
  }

  async function confirmAdd(category) {
    const input = $(`#addInput-${category}`);
    const name = input.value.trim();

    if (!name) {
      showToast('请输入食物名称');
      input.focus();
      return;
    }

    const duplicate = foodItems.find(
      f => f.category === category && f.name === name
    );
    if (duplicate) {
      showToast('该食物已存在于此分类中');
      input.focus();
      return;
    }

    try {
      await addFoodItem(name, category);
      showToast(`已添加「${name}」`);
      cancelAdd(category);
      foodItems = await loadFoodItems();
      renderAll();
    } catch (e) {
      showToast('添加失败，请检查网络连接');
      console.error(e);
    }
  }

  // ============================
  //  Delete Logic
  // ============================
  async function handleDelete(id, name) {
    if (!confirm(`确定要删除「${name}」吗？`)) return;

    const chip = document.querySelector(`.chip[data-id="${id}"]`);
    if (chip) {
      chip.classList.add('removing');
      await new Promise(r => setTimeout(r, 250));
    }

    try {
      await deleteFoodItem(id);
      showToast(`已删除「${name}」`);
      foodItems = await loadFoodItems();
      renderAll();
    } catch (e) {
      showToast('删除失败，请检查网络连接');
      console.error(e);
      if (chip) chip.classList.remove('removing');
    }
  }

  // Expose to global scope for onclick handlers
  window.showAddForm = showAddForm;
  window.cancelAdd = cancelAdd;
  window.confirmAdd = confirmAdd;
  window.handleDelete = handleDelete;

  // ============================
  //  Keyboard Shortcuts
  // ============================
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && currentAddCategory) {
      cancelAdd(currentAddCategory);
      return;
    }
    if (e.key === 'Enter' && currentAddCategory) {
      const input = $(`#addInput-${currentAddCategory}`);
      if (document.activeElement === input) {
        confirmAdd(currentAddCategory);
      }
    }
  });

  // ============================
  //  Init
  // ============================
  async function init() {
    // Check for existing session
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        onLoginSuccess(session.user);
        return;
      }
    } catch (e) {
      console.warn('Session check failed:', e);
    }

    // No session → show login
    switchToLogin();

    // Listen for auth state changes
    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        onLoginSuccess(session.user);
      } else if (event === 'SIGNED_OUT') {
        if (realtimeChannel) {
          supabase.removeChannel(realtimeChannel);
          realtimeChannel = null;
        }
        currentUser = null;
        foodItems = [];
        switchToLogin();
      }
    });
  }

  // Start
  init();
})();
</script>
</body>
</html>
