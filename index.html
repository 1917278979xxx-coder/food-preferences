<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍽️ 美食偏好管理</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --likes: #e05041;
  --likes-light: #ffe8e4;
  --likes-dark: #c0392b;
  --dislikes: #e0932d;
  --dislikes-light: #fff3e0;
  --dislikes-dark: #b8731b;
  --allergies: #d15252;
  --allergies-light: #ffeaea;
  --allergies-dark: #a83232;
  --bg: #fffaf5;
  --bg-card: #ffffff;
  --text: #3d2c1e;
  --text-secondary: #8b6f5c;
  --text-muted: #b8a090;
  --shadow: 0 4px 20px rgba(61, 44, 30, 0.07);
  --shadow-hover: 0 6px 28px rgba(61, 44, 30, 0.12);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --font-xl: clamp(2rem, 5vw, 2.8rem);
  --font-lg: clamp(1.3rem, 3.5vw, 1.6rem);
  --font-md: clamp(1rem, 2.5vw, 1.15rem);
  --font-sm: clamp(0.85rem, 2vw, 0.95rem);
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  min-height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* ===== App Container ===== */
.app {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: 30px 0 10px;
}
.header .icon {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.header h1 {
  font-size: var(--font-xl);
  color: var(--text);
  letter-spacing: 2px;
  margin-top: 6px;
}
.header .subtitle {
  font-size: var(--font-sm);
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== Sync indicator ===== */
.sync-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-muted);
  height: 24px;
  transition: opacity 0.3s;
}
.sync-bar .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5a9e6f;
  transition: background 0.3s;
}
.sync-bar.syncing .dot { background: #e0932d; animation: pulse 0.8s ease infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ===== Category Card ===== */
.category {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px 24px 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.3s ease;
  border: 2px solid transparent;
}
.category:hover {
  box-shadow: var(--shadow-hover);
}
.category.likes  { border-color: var(--likes-light); }
.category.dislikes { border-color: var(--dislikes-light); }
.category.allergies { border-color: var(--allergies-light); }

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.category-header .cat-icon {
  font-size: 28px;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.category.likes .cat-icon  { background: var(--likes-light); }
.category.dislikes .cat-icon { background: var(--dislikes-light); }
.category.allergies .cat-icon { background: var(--allergies-light); }

.category-header .cat-title {
  font-size: var(--font-lg);
  font-weight: 700;
  letter-spacing: 1px;
}
.category.likes .cat-title  { color: var(--likes-dark); }
.category.dislikes .cat-title { color: var(--dislikes-dark); }
.category.allergies .cat-title { color: var(--allergies-dark); }

.category-header .cat-count {
  font-size: var(--font-sm);
  color: var(--text-muted);
  font-weight: 500;
  margin-left: auto;
}

/* ===== Chips Container ===== */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 36px;
}

/* ===== Food Chip ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 8px 16px;
  border-radius: 50px;
  font-size: var(--font-sm);
  font-weight: 500;
  background: #f5f0eb;
  color: var(--text);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  cursor: default;
  animation: chipIn 0.3s ease;
}
.chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}
.chip .delete-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.08);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.chip .delete-btn:hover {
  background: var(--allergies);
  color: #fff;
}

@keyframes chipIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}

.chip.removing {
  animation: chipOut 0.25s ease forwards;
}
@keyframes chipOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.6); }
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 18px 0 8px;
  color: var(--text-muted);
  font-size: var(--font-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.empty-state .empty-icon {
  font-size: 32px;
  opacity: 0.5;
}

/* ===== Add Row ===== */
.add-row {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 18px;
  border-radius: 50px;
  border: 2px dashed var(--text-muted);
  background: transparent;
  color: var(--text-muted);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text-secondary);
  background: rgba(0,0,0,0.02);
}
.add-btn .plus {
  font-size: 18px;
  font-weight: 300;
  line-height: 1;
}

/* ===== Inline Add Form ===== */
.add-form {
  display: none;
  align-items: center;
  gap: 8px;
  width: 100%;
  animation: formIn 0.25s ease;
}
.add-form.active { display: flex; }
@keyframes formIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.add-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid #e0d7ce;
  font-size: var(--font-sm);
  font-family: inherit;
  background: #fdfcfb;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  max-width: 260px;
}
.add-input:focus {
  border-color: var(--likes);
}
.category.dislikes .add-input:focus { border-color: var(--dislikes); }
.category.allergies .add-input:focus { border-color: var(--allergies); }

.form-confirm, .form-cancel {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.form-confirm:active, .form-cancel:active { transform: scale(0.9); }

.form-confirm {
  background: #5a9e6f;
  color: #fff;
}
.form-confirm:hover { background: #4a8d5f; }

.form-cancel {
  background: #e8e0d8;
  color: var(--text-secondary);
}
.form-cancel:hover { background: #d8cfc5; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: #3d2c1e; color: #fff; padding: 14px 28px;
  border-radius: 50px; font-size: var(--font-sm); font-weight: 600;
  z-index: 200; pointer-events: none;
  transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== Summary Footer ===== */
.footer-summary {
  text-align: center;
  padding: 8px 0 30px;
  font-size: var(--font-sm);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-summary span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .app { padding: 16px 12px 60px; }
  .category { padding: 18px 16px 14px; margin-bottom: 14px; }
  .category-header { margin-bottom: 12px; }
  .category-header .cat-icon { width: 38px; height: 38px; font-size: 24px; border-radius: 12px; }
  .chips { gap: 8px; }
  .chip { padding: 7px 10px 7px 14px; font-size: 0.9rem; }
  .add-input { max-width: 180px; padding: 9px 14px; }
  .header { padding: 16px 0 4px; }
  .header .icon { font-size: 40px; }
}

@media (max-width: 360px) {
  .app { padding: 12px 8px 60px; }
  .category { padding: 14px 12px 10px; }
  .add-input { max-width: 140px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="icon">🍽️</div>
    <h1>美食偏好管理</h1>
    <p class="subtitle">记录朋友的口味与禁忌</p>
  </div>

  <!-- Sync indicator -->
  <div class="sync-bar" id="syncBar">
    <span class="dot" id="syncDot"></span>
    <span id="syncText">已同步</span>
  </div>

  <!-- Category: Likes -->
  <div class="category likes" id="cat-likes">
    <div class="category-header">
      <div class="cat-icon">❤️</div>
      <span class="cat-title">爱吃</span>
      <span class="cat-count" id="count-likes">0</span>
    </div>
    <div class="chips" id="chips-likes"></div>
    <div class="empty-state" id="empty-likes">
      <span class="empty-icon">🍲</span>
      <span>还没有记录，点击下方添加吧</span>
    </div>
    <div class="add-row" id="addRow-likes">
      <button class="add-btn" id="addBtn-likes" onclick="showAddForm('likes')">
        <span class="plus">+</span> 添加爱吃
      </button>
      <div class="add-form" id="addForm-likes">
        <input class="add-input" id="addInput-likes" type="text" placeholder="输入食物名称…" maxlength="50">
        <button class="form-confirm" onclick="confirmAdd('likes')" title="确认">✓</button>
        <button class="form-cancel" onclick="cancelAdd('likes')" title="取消">✕</button>
      </div>
    </div>
  </div>

  <!-- Category: Dislikes -->
  <div class="category dislikes" id="cat-dislikes">
    <div class="category-header">
      <div class="cat-icon">👎</div>
      <span class="cat-title">不喜欢吃</span>
      <span class="cat-count" id="count-dislikes">0</span>
    </div>
    <div class="chips" id="chips-dislikes"></div>
    <div class="empty-state" id="empty-dislikes">
      <span class="empty-icon">🥬</span>
      <span>还没有记录，点击下方添加吧</span>
    </div>
    <div class="add-row" id="addRow-dislikes">
      <button class="add-btn" id="addBtn-dislikes" onclick="showAddForm('dislikes')">
        <span class="plus">+</span> 添加不喜欢
      </button>
      <div class="add-form" id="addForm-dislikes">
        <input class="add-input" id="addInput-dislikes" type="text" placeholder="输入食物名称…" maxlength="50">
        <button class="form-confirm" onclick="confirmAdd('dislikes')" title="确认">✓</button>
        <button class="form-cancel" onclick="cancelAdd('dislikes')" title="取消">✕</button>
      </div>
    </div>
  </div>

  <!-- Category: Allergies -->
  <div class="category allergies" id="cat-allergies">
    <div class="category-header">
      <div class="cat-icon">⚠️</div>
      <span class="cat-title">过敏</span>
      <span class="cat-count" id="count-allergies">0</span>
    </div>
    <div class="chips" id="chips-allergies"></div>
    <div class="empty-state" id="empty-allergies">
      <span class="empty-icon">🫘</span>
      <span>还没有记录，点击下方添加吧</span>
    </div>
    <div class="add-row" id="addRow-allergies">
      <button class="add-btn" id="addBtn-allergies" onclick="showAddForm('allergies')">
        <span class="plus">+</span> 添加过敏
      </button>
      <div class="add-form" id="addForm-allergies">
        <input class="add-input" id="addInput-allergies" type="text" placeholder="输入食物名称…" maxlength="50">
        <button class="form-confirm" onclick="confirmAdd('allergies')" title="确认">✓</button>
        <button class="form-cancel" onclick="cancelAdd('allergies')" title="取消">✕</button>
      </div>
    </div>
  </div>

  <!-- Footer summary -->
  <div class="footer-summary" id="footerSummary"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ============================
//  Supabase Init
// ============================
const SUPABASE_URL = 'https://mbkdigtofgmdkepwsrve.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ia2RpZ3RvZmdtZGtlcHdzcnZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTMyMjcsImV4cCI6MjA5NzI2OTIyN30.BGlRJJbL6BvcZC1XrZTeN_3AOiiQgiAKniXfREunzeQ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ============================
//  App State
// ============================
let foodItems = [];
let realtimeChannel = null;
let currentAddCategory = null;

// ============================
//  DOM Helpers
// ============================
function $(selector) { return document.querySelector(selector); }

// ============================
//  Toast
// ============================
const toast = $('#toast');
let toastTimer = null;

function showToast(msg, duration = 2000) {
  if (toastTimer) clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    toastTimer = null;
  }, duration);
}

// ============================
//  HTML Escape
// ============================
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ============================
//  Supabase Operations
// ============================
async function loadFoodItems() {
  const { data, error } = await supabase
    .from('food_items')
    .select('*')
    .order('sort_order', { ascending: true });

  if (error) {
    console.error('Failed to load food items:', error);
    return [];
  }
  return data || [];
}

async function addFoodItem(name, category) {
  // Get the next sort_order for this category
  const itemsInCategory = foodItems.filter(f => f.category === category);
  const nextOrder = itemsInCategory.length > 0
    ? Math.max(...itemsInCategory.map(f => f.sort_order)) + 1
    : 0;

  const { data, error } = await supabase
    .from('food_items')
    .insert({ name, category, sort_order: nextOrder })
    .select()
    .single();

  if (error) {
    console.error('Failed to add food item:', error);
    throw error;
  }
  return data;
}

async function deleteFoodItem(id) {
  const { error } = await supabase
    .from('food_items')
    .delete()
    .eq('id', id);

  if (error) {
    console.error('Failed to delete food item:', error);
    throw error;
  }
}

// ============================
//  Realtime
// ============================
function subscribeToChanges() {
  if (realtimeChannel) {
    supabase.removeChannel(realtimeChannel);
  }

  realtimeChannel = supabase
    .channel('food-items-changes')
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'food_items' },
      async (payload) => {
        // Reload all items on any change
        setSyncStatus(true);
        foodItems = await loadFoodItems();
        renderAll();
        setTimeout(() => setSyncStatus(false), 600);
      }
    )
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        console.log('✅ Realtime subscribed to food_items');
      }
    });
}

function setSyncStatus(syncing) {
  const bar = $('#syncBar');
  const text = $('#syncText');
  if (syncing) {
    bar.classList.add('syncing');
    text.textContent = '同步中…';
  } else {
    bar.classList.remove('syncing');
    text.textContent = '已同步';
  }
}

// ============================
//  Rendering
// ============================
function renderAll() {
  const categories = ['likes', 'dislikes', 'allergies'];
  for (const cat of categories) {
    const items = foodItems.filter(f => f.category === cat);
    renderCategory(cat, items);
  }
  renderFooterSummary();
}

function renderCategory(category, items) {
  const chipsContainer = $(`#chips-${category}`);
  const emptyEl = $(`#empty-${category}`);
  const countEl = $(`#count-${category}`);
  const addRow = $(`#addRow-${category}`);

  // Count
  countEl.textContent = items.length > 0 ? `${items.length} 项` : '';

  // Empty state
  if (items.length === 0) {
    emptyEl.style.display = 'flex';
  } else {
    emptyEl.style.display = 'none';
  }

  // Render chips
  chipsContainer.innerHTML = items.map(item => `
    <span class="chip" data-id="${item.id}">
      ${escapeHtml(item.name)}
      <button class="delete-btn" onclick="handleDelete('${item.id}', '${escapeHtml(item.name).replace(/'/g, "\\'")}')" title="删除">✕</button>
    </span>
  `).join('');

  // Keep add row at the end
  chipsContainer.appendChild(addRow);
}

function renderFooterSummary() {
  const likes = foodItems.filter(f => f.category === 'likes').length;
  const dislikes = foodItems.filter(f => f.category === 'dislikes').length;
  const allergies = foodItems.filter(f => f.category === 'allergies').length;
  const total = foodItems.length;

  const footer = $('#footerSummary');
  if (total === 0) {
    footer.innerHTML = '<span>📝 开始记录朋友的美食偏好吧</span>';
  } else {
    footer.innerHTML = `
      <span>❤️ ${likes} 爱吃</span>
      <span>👎 ${dislikes} 不吃</span>
      <span>⚠️ ${allergies} 过敏</span>
      <span>📋 共 ${total} 项</span>
    `;
  }
}

// ============================
//  Add Form Logic
// ============================
function showAddForm(category) {
  // Hide any other open form first
  const allForms = document.querySelectorAll('.add-form');
  const allBtns = document.querySelectorAll('.add-btn');
  allForms.forEach(f => f.classList.remove('active'));
  allBtns.forEach(b => b.style.display = '');

  const btn = $(`#addBtn-${category}`);
  const form = $(`#addForm-${category}`);
  const input = $(`#addInput-${category}`);

  btn.style.display = 'none';
  form.classList.add('active');
  input.value = '';
  input.focus();
  currentAddCategory = category;
}

function cancelAdd(category) {
  const btn = $(`#addBtn-${category}`);
  const form = $(`#addForm-${category}`);
  const input = $(`#addInput-${category}`);

  form.classList.remove('active');
  input.value = '';
  btn.style.display = '';
  currentAddCategory = null;
}

async function confirmAdd(category) {
  const input = $(`#addInput-${category}`);
  const name = input.value.trim();

  if (!name) {
    showToast('请输入食物名称');
    input.focus();
    return;
  }

  // Check for duplicates in the same category
  const duplicate = foodItems.find(
    f => f.category === category && f.name === name
  );
  if (duplicate) {
    showToast('该食物已存在于此分类中');
    input.focus();
    return;
  }

  try {
    await addFoodItem(name, category);
    showToast(`已添加「${name}」`);
    cancelAdd(category);
    // Reload and re-render
    foodItems = await loadFoodItems();
    renderAll();
  } catch (e) {
    showToast('添加失败，请检查网络连接');
    console.error(e);
  }
}

// ============================
//  Delete Logic
// ============================
async function handleDelete(id, name) {
  if (!confirm(`确定要删除「${name}」吗？`)) return;

  // Add removing animation
  const chip = document.querySelector(`.chip[data-id="${id}"]`);
  if (chip) {
    chip.classList.add('removing');
    await new Promise(r => setTimeout(r, 250));
  }

  try {
    await deleteFoodItem(id);
    showToast(`已删除「${name}」`);
    foodItems = await loadFoodItems();
    renderAll();
  } catch (e) {
    showToast('删除失败，请检查网络连接');
    console.error(e);
    // Restore chip if failed
    if (chip) chip.classList.remove('removing');
  }
}

// ============================
//  Keyboard Shortcuts
// ============================
document.addEventListener('keydown', (e) => {
  // Escape to cancel add form
  if (e.key === 'Escape' && currentAddCategory) {
    cancelAdd(currentAddCategory);
    return;
  }
  // Enter to confirm add form
  if (e.key === 'Enter' && currentAddCategory) {
    const input = $(`#addInput-${currentAddCategory}`);
    if (document.activeElement === input) {
      confirmAdd(currentAddCategory);
    }
  }
});

// ============================
//  Init
// ============================
async function init() {
  try {
    setSyncStatus(true);
    foodItems = await loadFoodItems();
    renderAll();
    subscribeToChanges();
    setSyncStatus(false);
    console.log(`🍽️ 美食偏好管理已就绪 | ${foodItems.length} 项食物`);
  } catch (e) {
    console.error('Failed to initialize:', e);
    // Show offline empty state
    renderAll();
    setSyncStatus(false);
    $('#syncText').textContent = '离线模式';
    showToast('无法连接服务器，数据不可用', 3000);
  }
}

// Start
init();
</script>
</body>
</html>
