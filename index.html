<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍽️ 美食偏好管理</title>
<style>
/* ===== CSS Variables ===== */
:root {
  /* Primary: soft sage green */
  --primary: #6b9b6d;
  --primary-light: #e8f2e8;
  --primary-dark: #4a7a4c;

  /* Category: Likes - soft green */
  --likes: #6b9b6d;
  --likes-light: #e8f2e8;
  --likes-dark: #4a7a4c;

  /* Category: Dislikes - olive sage */
  --dislikes: #8a9a6a;
  --dislikes-light: #eef2e8;
  --dislikes-dark: #6a7a4a;

  /* Category: Allergies - muted warm accent */
  --allergies: #c48a6a;
  --allergies-light: #faf0e8;
  --allergies-dark: #a46a4a;

  /* Background & Surface */
  --bg: #f6f9f6;
  --bg-card: #ffffff;

  /* Text */
  --text: #3a4a3a;
  --text-secondary: #6b806b;
  --text-muted: #96a896;

  /* Shadows */
  --shadow: 0 4px 20px rgba(45, 58, 45, 0.06);
  --shadow-hover: 0 6px 28px rgba(45, 58, 45, 0.10);

  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --font-xl: clamp(2rem, 5vw, 2.8rem);
  --font-lg: clamp(1.3rem, 3.5vw, 1.6rem);
  --font-md: clamp(1rem, 2.5vw, 1.15rem);
  --font-sm: clamp(0.85rem, 2vw, 0.95rem);
}

/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

/* ===== App Wrapper ===== */
.app-wrapper {
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* ===== View Switching ===== */
.view {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  overflow-y: auto;
}
.view.active {
  opacity: 1;
  pointer-events: auto;
}

/* ===== Login View ===== */
.login-view {
  align-items: center;
  justify-content: center;
  padding: 30px 20px;
  background: var(--bg);
  gap: 20px;
}
.login-view .login-icon {
  font-size: 64px;
  animation: bounce 2s ease infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.login-view h1 {
  font-size: var(--font-xl);
  color: var(--text);
  letter-spacing: 2px;
  text-align: center;
}
.login-view .login-subtitle {
  font-size: var(--font-sm);
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 4px;
}
.login-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.login-card label {
  font-size: var(--font-sm);
  font-weight: 600;
  color: var(--text-secondary);
}
.login-card .form-input {
  width: 100%;
  padding: 16px 18px;
  border-radius: var(--radius-xs);
  border: 2px solid #d0d8d0;
  font-size: var(--font-md);
  font-family: inherit;
  background: #f8faf8;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  margin-top: 4px;
}
.login-card .form-input:focus { border-color: var(--dislikes); }
.login-error {
  color: var(--allergies);
  font-size: var(--font-sm);
  text-align: center;
  min-height: 20px;
  font-weight: 500;
}
.btn-login {
  width: 100%;
  padding: 16px;
  border-radius: 50px;
  border: none;
  background: var(--likes);
  color: #fff;
  font-size: var(--font-md);
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-login:hover { background: var(--likes-dark); }
.btn-login:active { transform: scale(0.97); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-footer {
  text-align: center;
  font-size: var(--font-sm);
}
.login-footer a {
  color: var(--dislikes-dark);
  cursor: pointer;
  text-decoration: none;
  font-weight: 500;
  transition: color 0.2s;
}
.login-footer a:hover { color: var(--dislikes); }

/* ===== Common: App Container ===== */
.app {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== Common: Header ===== */
.header {
  text-align: center;
  padding: 30px 0 10px;
}
.header .icon {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.header h1 {
  font-size: var(--font-xl);
  color: var(--text);
  letter-spacing: 2px;
  margin-top: 6px;
}
.header .subtitle {
  font-size: var(--font-sm);
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== Common: User Bar ===== */
.user-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 6px 0 10px;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.user-bar .user-email {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}
.user-bar .logout-btn {
  background: none;
  border: 1px solid var(--text-muted);
  color: var(--text-muted);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.75rem;
  font-family: inherit;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.user-bar .logout-btn:hover {
  border-color: var(--allergies);
  color: var(--allergies);
}

/* ===== Friend List View ===== */
.friend-list-view { background: var(--bg); }

.back-row {
  padding: 0 0 8px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: var(--font-sm);
  font-family: inherit;
  cursor: pointer;
  padding: 6px 4px;
  transition: color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:hover { color: var(--text); }

.friend-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.friend-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s ease;
  border: 2px solid transparent;
}
.friend-card:hover {
  box-shadow: var(--shadow-hover);
  border-color: #c8d8c8;
  transform: translateY(-1px);
}
.friend-card .friend-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  background-size: cover;
  background-position: center;
  position: relative;
  cursor: pointer;
  transition: opacity 0.2s;
}
.friend-card .friend-avatar:hover {
  opacity: 0.85;
}
.friend-card .friend-avatar::after {
  content: '📷';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: rgba(0,0,0,0.35);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.friend-card .friend-avatar.has-photo::after {
  content: '🔄';
}
.friend-card .friend-avatar:hover::after {
  opacity: 1;
}
.friend-card .friend-avatar.has-photo {
  /* photo is set via background-image on the element */;
}
.friend-card .friend-info {
  flex: 1;
  min-width: 0;
}
.friend-card .friend-name {
  font-size: var(--font-md);
  font-weight: 600;
  color: var(--text);
}
.friend-card .friend-meta {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.friend-card .friend-arrow {
  color: var(--text-muted);
  font-size: 18px;
  flex-shrink: 0;
}
.friend-card .friend-delete {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.05);
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.friend-card .friend-delete:hover {
  background: var(--allergies);
  color: #fff;
}

/* Friend add row */
.friend-add-row {
  margin-top: 4px;
}
.friend-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 12px 20px;
  border-radius: 50px;
  border: 2px dashed var(--text-muted);
  background: transparent;
  color: var(--text-muted);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.friend-add-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text-secondary);
  background: rgba(0,0,0,0.02);
}
.friend-add-btn .plus { font-size: 18px; font-weight: 300; line-height: 1; }

.friend-add-form {
  display: none;
  align-items: center;
  gap: 8px;
  animation: formIn 0.25s ease;
}
.friend-add-form.active { display: flex; }
@keyframes formIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.friend-add-form .friend-add-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid #d0d8d0;
  font-size: var(--font-sm);
  font-family: inherit;
  background: #f8faf8;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  max-width: 240px;
}
.friend-add-form .friend-add-input:focus { border-color: var(--dislikes); }

.friend-empty {
  text-align: center;
  padding: 40px 0 16px;
  color: var(--text-muted);
  font-size: var(--font-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.friend-empty .empty-icon { font-size: 48px; opacity: 0.4; }

/* ===== Friend Detail View (food preferences) ===== */
.detail-view { background: var(--bg); }

.detail-header {
  text-align: center;
  padding: 24px 0 10px;
}
.detail-header .detail-icon {
  font-size: 52px;
  animation: float 3s ease-in-out infinite;
}
.detail-header h1 {
  font-size: var(--font-lg);
  color: var(--text);
  letter-spacing: 1px;
  margin-top: 6px;
}
.detail-header .friend-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  background: #eef3ee;
  font-size: var(--font-sm);
  color: var(--text-secondary);
  font-weight: 500;
}

/* ===== Export Buttons ===== */
.export-row {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 0 0 16px;
  flex-wrap: wrap;
}
.export-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 16px;
  border-radius: 50px;
  border: 1.5px solid #d0d8d0;
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.export-btn:hover {
  border-color: var(--text-muted);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.export-btn:active { transform: scale(0.96); }

/* ===== Sync indicator ===== */
.sync-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-muted);
  height: 24px;
  transition: opacity 0.3s;
}
.sync-bar .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #5a9e6f;
  transition: background 0.3s;
}
.sync-bar.syncing .dot { background: #e0932d; animation: pulse 0.8s ease infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ===== Category Card ===== */
.category {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px 24px 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.3s ease;
  border: 2px solid transparent;
}
.category:hover { box-shadow: var(--shadow-hover); }
.category.likes  { border-color: var(--likes-light); }
.category.dislikes { border-color: var(--dislikes-light); }
.category.allergies { border-color: var(--allergies-light); }

.category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.category-header .cat-icon {
  font-size: 28px;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.category.likes .cat-icon  { background: var(--likes-light); }
.category.dislikes .cat-icon { background: var(--dislikes-light); }
.category.allergies .cat-icon { background: var(--allergies-light); }

.category-header .cat-title {
  font-size: var(--font-lg);
  font-weight: 700;
  letter-spacing: 1px;
}
.category.likes .cat-title  { color: var(--likes-dark); }
.category.dislikes .cat-title { color: var(--dislikes-dark); }
.category.allergies .cat-title { color: var(--allergies-dark); }

.category-header .cat-count {
  font-size: var(--font-sm);
  color: var(--text-muted);
  font-weight: 500;
  margin-left: auto;
}

/* ===== Chips Container ===== */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  min-height: 36px;
}

/* ===== Food Chip ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 8px 16px;
  border-radius: 50px;
  font-size: var(--font-sm);
  font-weight: 500;
  background: #eef3ee;
  color: var(--text);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  cursor: default;
  animation: chipIn 0.3s ease;
}
.chip:hover {
  transform: translateY(-1px);
  box-shadow: 0 3px 12px rgba(0,0,0,0.08);
}
.chip .delete-btn {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.08);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.chip .delete-btn:hover {
  background: var(--allergies);
  color: #fff;
}

@keyframes chipIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}
.chip.removing {
  animation: chipOut 0.25s ease forwards;
}
@keyframes chipOut {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(0.6); }
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 18px 0 8px;
  color: var(--text-muted);
  font-size: var(--font-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.empty-state .empty-icon { font-size: 32px; opacity: 0.5; }

/* ===== Add Row ===== */
.add-row {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.add-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 18px;
  border-radius: 50px;
  border: 2px dashed var(--text-muted);
  background: transparent;
  color: var(--text-muted);
  font-size: var(--font-sm);
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.25s ease;
  -webkit-tap-highlight-color: transparent;
}
.add-btn:hover {
  border-color: var(--text-secondary);
  color: var(--text-secondary);
  background: rgba(0,0,0,0.02);
}
.add-btn .plus { font-size: 18px; font-weight: 300; line-height: 1; }

/* ===== Inline Add Form ===== */
.add-form {
  display: none;
  align-items: center;
  gap: 8px;
  width: 100%;
  animation: formIn 0.25s ease;
}
.add-form.active { display: flex; }

.add-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 50px;
  border: 2px solid #d0d8d0;
  font-size: var(--font-sm);
  font-family: inherit;
  background: #f8faf8;
  color: var(--text);
  outline: none;
  transition: border-color 0.25s;
  max-width: 260px;
}
.add-input:focus { border-color: var(--likes); }
.category.dislikes .add-input:focus { border-color: var(--dislikes); }
.category.allergies .add-input:focus { border-color: var(--allergies); }

.form-confirm, .form-cancel {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.form-confirm:active, .form-cancel:active { transform: scale(0.9); }
.form-confirm { background: #5a9e6f; color: #fff; }
.form-confirm:hover { background: #4a8d5f; }
.form-cancel { background: #d8e0d8; color: var(--text-secondary); }
.form-cancel:hover { background: #c8d4c8; }

/* ===== Tag inputs in add form ===== */
.tag-inputs-row {
  display: flex;
  gap: 6px;
  width: 100%;
  flex-wrap: wrap;
}
.tag-input {
  flex: 1;
  min-width: 80px;
  padding: 8px 12px;
  border-radius: 50px;
  border: 1.5px solid #d0d8d0;
  font-size: 0.78rem;
  font-family: inherit;
  background: #f5f8f5;
  color: var(--text-secondary);
  outline: none;
  transition: border-color 0.25s;
}
.tag-input:focus { border-color: var(--dislikes); }
.tag-input::placeholder { color: #b0bdb0; }

/* ===== Chip tag sub-text ===== */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px 8px 16px;
  border-radius: 50px;
  font-size: var(--font-sm);
  font-weight: 500;
  background: #eef3ee;
  color: var(--text);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  cursor: default;
  animation: chipIn 0.3s ease;
}
.chip-content {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.chip-name { line-height: 1.3; }
.chip-tags {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 400;
  line-height: 1.2;
}

/* ===== Filter Bar ===== */
.filter-bar {
  display: none;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  padding: 4px 0 14px;
}
.filter-bar.active { display: flex; }
.filter-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-right: 2px;
}
.filter-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 50px;
  border: 1.5px solid #d0d8d0;
  background: #f8faf8;
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.filter-pill:hover { border-color: var(--text-muted); }
.filter-pill.active {
  background: var(--dislikes);
  color: #fff;
  border-color: var(--dislikes);
}
.filter-pill .store-dot { color: var(--dislikes); }
.filter-pill .dish-dot { color: var(--likes-dark); }
.filter-pill.active .store-dot,
.filter-pill.active .dish-dot { color: inherit; }
.filter-clear {
  font-size: 0.75rem;
  color: var(--allergies);
  cursor: pointer;
  font-weight: 500;
  padding: 4px 8px;
}
.filter-clear:hover { text-decoration: underline; }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: #3a4a3a; color: #fff; padding: 14px 28px;
  border-radius: 50px; font-size: var(--font-sm); font-weight: 600;
  z-index: 200; pointer-events: none;
  transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== Summary Footer ===== */
.footer-summary {
  text-align: center;
  padding: 8px 0 30px;
  font-size: var(--font-sm);
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.footer-summary span { display: inline-flex; align-items: center; gap: 4px; }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .app { padding: 16px 12px 60px; }
  .category { padding: 18px 16px 14px; margin-bottom: 14px; }
  .category-header { margin-bottom: 12px; }
  .category-header .cat-icon { width: 38px; height: 38px; font-size: 24px; border-radius: 12px; }
  .chips { gap: 8px; }
  .chip { padding: 7px 10px 7px 14px; font-size: 0.9rem; }
  .add-input { max-width: 180px; padding: 9px 14px; }
  .header { padding: 16px 0 4px; }
  .header .icon { font-size: 40px; }
  .login-card { padding: 24px 18px; gap: 14px; }
  .login-view .login-icon { font-size: 48px; }
  .friend-card { padding: 14px 16px; }
  .detail-header { padding: 16px 0 6px; }
  .detail-header .detail-icon { font-size: 40px; }
}

@media (max-width: 360px) {
  .app { padding: 12px 8px 60px; }
  .category { padding: 14px 12px 10px; }
  .add-input { max-width: 140px; }
  .login-card { padding: 20px 14px; }
  .friend-card { padding: 12px 14px; }
  .friend-add-input { max-width: 160px; }
}

/* ===== Print Styles (for PDF export) ===== */
@media print {
  body { background: #fff; }
  .app-wrapper { position: static; height: auto; overflow: visible; }
  .view { position: static; opacity: 1; pointer-events: auto; overflow: visible; }
  .user-bar, .export-row, .add-row, .add-btn, .add-form,
  .sync-bar, .toast, .delete-btn, .footer-summary,
  .back-row, .friend-delete, .friend-add-row,
  #syncBar, #syncText, .chip .delete-btn { display: none !important; }
  .chip { background: #f0f0f0; border: 1px solid #ddd; animation: none; }
  .category { box-shadow: none; break-inside: avoid; margin-bottom: 16px; border: 1px solid #e0e0e0; }
  .app { max-width: 100%; padding: 0; }
  .detail-header { padding: 10px 0 16px; }
  .detail-header .detail-icon { animation: none; }
  @page { margin: 1.5cm; }
}

/* ===== Groups CSS Variables ===== */
:root {
  --group: #5b9bb5;
  --group-light: #e8f2f6;
  --group-dark: #3d7a95;
  --tab-bg: #ffffff;

}

/* ===== Bottom Tab Bar ===== */
.bottom-tabs {
  position: fixed;

.bottom-tabs.hidden {

  pointer-events: none;
}
.tab-btn {
  display: flex;

.tab-btn:active { transform: scale(0.92); }
.tab-btn .tab-icon { font-size: 24px; line-height: 1; }

/* Bottom padding for tab bar (all views except login) */
.friend-list-view .app,
.detail-view .app,
.group-list-view .app,
.group-detail-view .app {

}
.group-list-view {
  align-items: unset;
  justify-content: unset;
}

/* ===== Group List ===== */
.group-list-view .header {

  padding-bottom: 8px;
}
.group-list-view .header .icon { font-size: var(--font-xl); }
.group-cards {

  gap: 12px;
}
.group-card {

}

.group-card .group-icon {

.group-card .group-info { flex: 1; min-width: 0; }
.group-card .group-name { font-size: var(--font-md); font-weight: 700; color: var(--text); }
.group-card .group-meta {

}
.group-card .group-meta span { display: inline-flex; align-items: center; gap: 3px; }
.group-card .group-arrow { color: var(--text-muted); font-size: 18px; flex-shrink: 0; }

/* Group add / join rows */
.group-add-row, .group-join-row { margin-top: 6px; }
.group-add-btn, .group-join-btn {

  padding: 16px;

  border-radius: var(--radius-sm);

  font-size: var(--font-md);

}

/* ===== Group Detail View ===== */
.group-detail-view .app { position: relative; }
.group-detail-header {

  padding: 8px 0 12px;
}
.group-detail-header .group-icon-lg { font-size: 48px; }

.group-detail-header .invite-code-row {

  margin-top: 4px;

  border-radius: 20px;

  color: var(--group-dark);

  color: var(--text-muted);
}
.group-detail-header .member-count {

  color: var(--text-muted);
  margin-top: 4px;
}
.group-detail-header .detail-actions {

  gap: 10px;
  margin-top: 12px;
}
.group-detail-header .action-pill {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--text-muted);
  background: transparent;
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.group-detail-header .action-pill:active { background: rgba(0,0,0,0.03); }
.group-detail-header .action-pill.log-pill { border-color: var(--group); color: var(--group-dark); }

.group-friends-list { margin-top: 4px; }
.group-friend-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.group-friend-card:active { transform: scale(0.985); }
.group-friend-card .gf-avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.group-friend-card .gf-info { flex: 1; min-width: 0; }
.group-friend-card .gf-name { font-weight: 600; font-size: var(--font-md); }
.group-friend-card .gf-meta {
  font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;
  display: flex; align-items: center; gap: 8px;
}
.group-friend-card .gf-meta .contributor {
  background: var(--group-light);

  border-radius: 10px;
  font-size: 0.7rem;
}
.group-friend-card .gf-arrow { color: var(--text-muted); font-size: 18px; }

/* Group add friend row */
.group-add-friend-row { margin-top: 10px; }
.group-add-friend-btn {
  width: 100%;
  padding: 14px;
  border: 2px dashed var(--text-muted);
  border-radius: var(--radius-sm);
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: var(--font-sm);
  color: var(--text-secondary);
  transition: all 0.2s;
}
.group-add-friend-btn:active { background: rgba(0,0,0,0.02); }
.group-add-friend-form {
  display: none;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  animation: formIn 0.25s ease;
}
.group-add-friend-form.active { display: flex; }
.group-add-friend-form input {
  flex: 1;
  padding: 14px 16px;
  border: 2px solid #e0e4e0;

}
.group-add-friend-form input:focus { border-color: var(--primary); }

/* ===== Edit Log Overlay ===== */
.edit-log-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.edit-log-overlay.active { opacity: 1; pointer-events: auto; }
.edit-log-panel {
  background: var(--bg-card);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%;
  max-height: 70vh;
  overflow-y: auto;
  padding: 24px 20px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.edit-log-overlay.active .edit-log-panel { transform: translateY(0); }
.edit-log-panel .log-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.edit-log-panel .log-header h3 { font-size: var(--font-lg); color: var(--text); }
.edit-log-panel .log-close-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.06);
  font-size: 18px;
  cursor: pointer;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
}
.edit-log-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: var(--font-sm);
}
.log-entry {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  align-items: flex-start;
  animation: chipIn 0.3s ease;
}
.log-entry .log-icon {
  width: 34px; height: 34px;

  justify-content: center;

}
.log-entry.add .log-icon { background: #e8f5e8; color: var(--log-add); }
.log-entry.delete .log-icon { background: #faf0e8; color: var(--log-delete); }
.log-entry .log-body { flex: 1; min-width: 0; }

.log-entry .log-text strong { color: var(--text); }
.log-entry .log-text .log-cat {

  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 500;
}
.log-entry .log-text .log-cat.likes { background: var(--likes-light); color: var(--likes-dark); }
.log-entry .log-text .log-cat.dislikes { background: var(--dislikes-light); color: var(--dislikes-dark); }
.log-entry .log-text .log-cat.allergies { background: var(--allergies-light); color: var(--allergies-dark); }
.log-entry .log-meta {

  display: flex; align-items: center; gap: 6px;

.log-entry .log-meta .log-user {

  padding: 0 6px;
  border-radius: 6px;
  font-size: 0.7rem;
}

    if (msg.includes('Email not confirmed'))

    if (msg.includes('User already registered') || msg.includes('already been registered'))

    if (msg.includes('password') && msg.includes('weak'))
      return '密码太弱，请使用6位以上密码';

      return '请输入有效的邮箱地址';
    if (msg.includes('rate') || msg.includes('limit'))

    if (msg.includes('network') || msg.includes('fetch'))
      return '网络连接失败，请检查网络';
    return `登录失败：${msg}`;

  let editingAvatarFriendId = null;

      return;
    }

    try {
      showToast('正在处理头像…', 2000);

      // Resize and convert to base64 (max 200x200, JPEG quality 0.7)

      // Update friend in Supabase

        .from('friends')

      renderFriendList();

      // Also sync if on detail view

    } catch (err) {
      console.error('Avatar upload failed:', err);
      showToast('❌ 头像上传失败：' + (err.message || '请重试'), 3000);
    } finally {
      editingAvatarFriendId = null;
    }
  }

  function resizeImageToDataUrl(file, maxSize, quality) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          // Calculate new dimensions
          let w = img.width, h = img.height;
          if (w > maxSize || h > maxSize) {
            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
            else { w = Math.round(w * maxSize / h); h = maxSize; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('图片加载失败'));
        img.src = reader.result;
      };
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsDataURL(file);
    });
  }

  async function loadFoodItems(friendId) {
    const fid = friendId || (currentFriend ? currentFriend.id : null);
    if (!fid) return [];

    const { data, error } = await supabase
      .from('food_items')
      .select('*')
      .eq('friend_id', fid)
      .eq('user_id', currentUser.id)
      .order('sort_order', { ascending: true });

    if (error) {
      console.error('Failed to load food items:', error);
      return [];
    }
    return data || [];
  }

  async function addFoodItem(name, category, storeTag, dishTag) {
    if (!currentFriend) throw new Error('No friend selected');

    const itemsInCategory = foodItems.filter(f => f.category === category);
    const nextOrder = itemsInCategory.length > 0
      ? Math.max(...itemsInCategory.map(f => f.sort_order)) + 1
      : 0;

    const groupId = currentGroup ? currentGroup.id : null;
    const { data, error } = await supabase
      .from('food_items')
      .insert({
        name, category,
        sort_order: nextOrder,
        friend_id: currentFriend.id,
        user_id: currentUser.id,
        group_id: groupId,
        store_tag: storeTag || null,
        dish_tag: dishTag || null
      })
      .select()
      .single();

    if (error) {
      console.error('Failed to add food item:', error);
      throw error;
    }

    // Log edit in group context
    if (currentGroup) {
      logEdit('add', name, category, currentFriend.id, currentGroup.id);
    }

    return data;
  }

  async function deleteFoodItem(id) {
    // Capture item info before delete for edit log
    const item = foodItems.find(f => f.id === id);
    const itemName = item ? item.name : '';
    const itemCategory = item ? item.category : '';

    const { error } = await supabase
      .from('food_items')
      .delete()
      .eq('id', id)
      .eq('user_id', currentUser.id);

    if (error) {
      console.error('Failed to delete food item:', error);
      throw error;
    }

    // Log edit in group context
    if (currentGroup && itemName) {
      logEdit('delete', itemName, itemCategory, currentFriend.id, currentGroup.id);
    }
  }

  // ============================
  //  Realtime
  // ============================
  function subscribeToChanges() {
    if (realtimeChannel) {
      supabase.removeChannel(realtimeChannel);
    }

    realtimeChannel = supabase
      .channel('app-changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'food_items', filter: `user_id=eq.${currentUser.id}` },
        async () => {
          // Reload food items if we're on detail view
          if (currentFriend) {
            setSyncStatus(true);
            foodItems = await loadFoodItems(currentFriend.id);
            renderAll();
            setTimeout(() => setSyncStatus(false), 600);
          }
        }
      )
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'friends', filter: `user_id=eq.${currentUser.id}` },
        async () => {
          // Reload friends list
          friends = await loadFriends();
          // Re-render if on friend list view
          if (!currentFriend) renderFriendList();
        }
      )
      .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
          console.log('✅ Realtime subscribed');
        }
      });
  }

  function setSyncStatus(syncing) {
    const bar = $('#syncBar');
    const text = $('#syncText');
    if (!bar || !text) return;
    if (syncing) {
      bar.classList.add('syncing');
      text.textContent = '同步中…';
    } else {
      bar.classList.remove('syncing');
      text.textContent = '已同步';
    }
  }

  // ============================
  //  Rendering
  // ============================
  function renderAll() {
    renderFilterBar();
    const categories = ['likes', 'dislikes', 'allergies'];
    for (const cat of categories) {
      const items = getFilteredItems(cat);
      renderCategory(cat, items);
    }
    renderFooterSummary();
  }

  function renderCategory(category, items) {
    const chipsContainer = $(`#chips-${category}`);
    const emptyEl = $(`#empty-${category}`);
    const countEl = $(`#count-${category}`);
    const addRow = $(`#addRow-${category}`);

    if (!chipsContainer) return;

    countEl.textContent = items.length > 0 ? `${items.length} 项` : '';

    if (items.length === 0) {
      emptyEl.style.display = 'flex';
    } else {
      emptyEl.style.display = 'none';
    }

    chipsContainer.innerHTML = items.map(item => {
      const tags = [];
      if (item.store_tag) tags.push(escapeHtml(item.store_tag));
      if (item.dish_tag) tags.push(escapeHtml(item.dish_tag));
      const tagLine = tags.length > 0
        ? `<span class="chip-tags">${tags.join(' · ')}</span>`
        : '';
      return `
        <span class="chip" data-id="${item.id}">
          <span class="chip-content">
            <span class="chip-name">${escapeHtml(item.name)}</span>
            ${tagLine}
          </span>
          <button class="delete-btn" onclick="handleDelete('${item.id}', '${escapeHtml(item.name).replace(/'/g, "\\'")}')" title="删除">✕</button>
        </span>
      `;
    }).join('');

    chipsContainer.appendChild(addRow);
  }

  function renderFooterSummary() {
    const footer = $('#footerSummary');
    if (!footer) return;

    const likes = foodItems.filter(f => f.category === 'likes').length;
    const dislikes = foodItems.filter(f => f.category === 'dislikes').length;
    const allergies = foodItems.filter(f => f.category === 'allergies').length;
    const total = foodItems.length;

    if (total === 0) {
      footer.innerHTML = '<span>📝 开始记录朋友的美食偏好吧</span>';
    } else {
      footer.innerHTML = `
        <span>❤️ ${likes} 爱吃</span>
        <span>👎 ${dislikes} 不吃</span>
        <span>⚠️ ${allergies} 过敏</span>
        <span>📋 共 ${total} 项</span>
      `;
    }
  }

  // ============================
  //  Filter Logic
  // ============================
  function getAllStoreTags() {
    const tags = new Set();
    foodItems.forEach(item => { if (item.store_tag) tags.add(item.store_tag); });
    return Array.from(tags).sort();
  }

  function getAllDishTags() {
    const tags = new Set();
    foodItems.forEach(item => { if (item.dish_tag) tags.add(item.dish_tag); });
    return Array.from(tags).sort();
  }

  function setFilter(type, value) {
    if (currentFilter && currentFilter.type === type && currentFilter.value === value) {
      // Toggle off
      currentFilter = null;
    } else {
      currentFilter = { type, value };
    }
    renderAll();
  }

  function clearFilter() {
    currentFilter = null;
    renderAll();
  }

  function getFilteredItems(category) {
    const items = foodItems.filter(f => f.category === category);
    if (!currentFilter) return items;
    const { type, value } = currentFilter;
    return items.filter(f => {
      if (type === 'store') return f.store_tag === value;
      if (type === 'dish') return f.dish_tag === value;
      return true;
    });
  }

  function renderFilterBar() {
    const bar = $('#filterBar');
    if (!bar) return;

    const storeTags = getAllStoreTags();
    const dishTags = getAllDishTags();
    const hasAnyTags = storeTags.length > 0 || dishTags.length > 0;

    if (!hasAnyTags) {
      bar.classList.remove('active');
      bar.innerHTML = '<span class="filter-label">🔍</span>';
      return;
    }

    bar.classList.add('active');

    let html = '<span class="filter-label">🔍 筛选：</span>';

    // "全部" pill
    html += `<span class="filter-pill${currentFilter ? '' : ' active'}" onclick="window.clearFilter()">全部</span>`;

    // Store pills
    for (const tag of storeTags) {
      const active = currentFilter && currentFilter.type === 'store' && currentFilter.value === tag;
      html += `<span class="filter-pill${active ? ' active' : ''}" onclick="window.setFilter('store', '${escapeHtml(tag).replace(/'/g, "\\'")}')"><span class="store-dot">🏪</span> ${escapeHtml(tag)}</span>`;
    }

    // Dish pills
    for (const tag of dishTags) {
      const active = currentFilter && currentFilter.type === 'dish' && currentFilter.value === tag;
      html += `<span class="filter-pill${active ? ' active' : ''}" onclick="window.setFilter('dish', '${escapeHtml(tag).replace(/'/g, "\\'")}')"><span class="dish-dot">🍳</span> ${escapeHtml(tag)}</span>`;
    }

    bar.innerHTML = html;
  }

  // ============================
  //  Add Form Logic
  // ============================
  function showAddForm(category) {
    const allForms = document.querySelectorAll('.add-form');
    const allBtns = document.querySelectorAll('.add-btn');
    allForms.forEach(f => f.classList.remove('active'));
    allBtns.forEach(b => b.style.display = '');

    const btn = $(`#addBtn-${category}`);
    const form = $(`#addForm-${category}`);
    const input = $(`#addInput-${category}`);
    const storeInput = $(`#storeInput-${category}`);
    const dishInput = $(`#dishInput-${category}`);

    btn.style.display = 'none';
    form.classList.add('active');
    input.value = '';
    if (storeInput) storeInput.value = '';
    if (dishInput) dishInput.value = '';
    input.focus();
    currentAddCategory = category;
  }

  function cancelAdd(category) {
    const btn = $(`#addBtn-${category}`);
    const form = $(`#addForm-${category}`);
    const input = $(`#addInput-${category}`);
    const storeInput = $(`#storeInput-${category}`);
    const dishInput = $(`#dishInput-${category}`);

    form.classList.remove('active');
    input.value = '';
    if (storeInput) storeInput.value = '';
    if (dishInput) dishInput.value = '';
    btn.style.display = '';
    currentAddCategory = null;
  }

  async function confirmAdd(category) {
    const input = $(`#addInput-${category}`);
    const storeInput = $(`#storeInput-${category}`);
    const dishInput = $(`#dishInput-${category}`);
    const name = input.value.trim();
    const storeTag = storeInput ? storeInput.value.trim() : '';
    const dishTag = dishInput ? dishInput.value.trim() : '';

    if (!name) {
      showToast('请输入食物名称');
      input.focus();
      return;
    }

    const duplicate = foodItems.find(
      f => f.category === category && f.name === name
    );
    if (duplicate) {
      showToast('该食物已存在于此分类中');
      input.focus();
      return;
    }

    try {
      await addFoodItem(name, category, storeTag, dishTag);
      showToast(`已添加「${name}」`);
      cancelAdd(category);
      foodItems = await loadFoodItems(currentFriend.id);
      renderAll();
    } catch (e) {
      showToast('添加失败，请检查网络连接', 2000);
      console.error(e);
    }
  }

  // ============================
  //  Delete Logic
  // ============================
  async function handleDelete(id, name) {
    if (!confirm(`确定要删除「${name}」吗？`)) return;

    const chip = document.querySelector(`.chip[data-id="${id}"]`);
    if (chip) {
      chip.classList.add('removing');
      await new Promise(r => setTimeout(r, 250));
    }

    try {
      await deleteFoodItem(id);
      showToast(`已删除「${name}」`);
      foodItems = await loadFoodItems(currentFriend.id);
      renderAll();
    } catch (e) {
      showToast('删除失败，请检查网络连接');
      console.error(e);
      if (chip) chip.classList.remove('removing');
    }
  }

  window.showAddForm = showAddForm;
  window.cancelAdd = cancelAdd;
  window.confirmAdd = confirmAdd;
  window.handleDelete = handleDelete;

  // ============================
  //  Export Functions
  // ============================
  const CAT_LABELS = { likes: '爱吃', dislikes: '不喜欢吃', allergies: '过敏' };
  const CAT_EMOJI = { likes: '❤️', dislikes: '👎', allergies: '⚠️' };

  function getCategoryItems() {
    return {
      likes: foodItems.filter(f => f.category === 'likes').map(f => f.name),
      dislikes: foodItems.filter(f => f.category === 'dislikes').map(f => f.name),
      allergies: foodItems.filter(f => f.category === 'allergies').map(f => f.name),
    };
  }

  function downloadBlob(content, filename, mimeType) {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function exportCSV() {
    if (foodItems.length === 0) {
      showToast('暂无数据可导出');
      return;
    }
    const friendName = currentFriend ? currentFriend.name : '未知';
    let csv = '﻿分类,食物名称\n';
    for (const item of foodItems) {
      csv += `${CAT_LABELS[item.category]},${item.name}\n`;
    }
    const date = new Date().toISOString().slice(0, 10);
    downloadBlob(csv, `${friendName}_美食偏好_${date}.csv`, 'text/csv;charset=utf-8');
    showToast('已导出 CSV 文件');
  }

  function exportText() {
    if (foodItems.length === 0) {
      showToast('暂无数据可导出');
      return;
    }
    const friendName = currentFriend ? currentFriend.name : '未知';
    const data = getCategoryItems();
    const date = new Date().toISOString().slice(0, 10);
    let text = `${friendName} 的美食偏好\n`;
    text += `导出日期：${date}\n`;
    text += `${'='.repeat(30)}\n\n`;

    for (const cat of ['likes', 'dislikes', 'allergies']) {
      text += `${CAT_EMOJI[cat]} ${CAT_LABELS[cat]}：\n`;
      if (data[cat].length === 0) {
        text += '（无）\n';
      } else {
        data[cat].forEach(name => { text += `  • ${name}\n`; });
      }
      text += '\n';
    }

    downloadBlob(text, `${friendName}_美食偏好_${date}.txt`, 'text/plain;charset=utf-8');
    showToast('已导出文本文件');
  }

  function exportPDF() {
    if (foodItems.length === 0) {
      showToast('暂无数据可导出');
      return;
    }
    showToast('正在打开打印对话框…', 1500);
    setTimeout(() => window.print(), 300);
  }

  window.exportCSV = exportCSV;
  window.exportText = exportText;
  window.exportPDF = exportPDF;

  async function init() {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        $('#friendListUserEmail').textContent = session.user.email;

        friends = await loadFriends();
        switchToFriendList();
        renderFriendList();
        subscribeToChanges();
        console.log(`🍽️ 美食偏好管理已就绪 | ${friends.length} 位朋友`);
        return;
      }
    } catch (e) {
      console.warn('Session check failed:', e);
    }

    switchToLogin();

    supabase.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        onLoginSuccess(session.user);
      } else if (event === 'SIGNED_OUT') {
        if (realtimeChannel) {
          supabase.removeChannel(realtimeChannel);
          realtimeChannel = null;
        }
        currentUser = null;
        currentFriend = null;
        foodItems = [];
        friends = [];
        switchToLogin();
      }
    });
  }

  // ============================
  //  Group CRUD
  // ============================
  function generateInviteCode() {
    return crypto.randomUUID().replace(/-/g, '').slice(0, 8).toUpperCase();
  }

  window.confirmCreateGroup = async function() {
    const name = $('#groupAddInput').value.trim();
    if (!name) { showToast('请输入小组名称'); return; }
    const code = generateInviteCode();
    try {
      const { data: group, error } = await supabase
        .from('groups')
        .insert({ name, invite_code: code, created_by: currentUser.id })
        .select()
        .single();
      if (error) throw error;

      // Auto-join as owner
      const nickname = currentUser.email ? currentUser.email.split('@')[0] : '我';
      await supabase.from('group_members').insert({
        group_id: group.id, user_id: currentUser.id, role: 'owner', nickname
      });

      showToast('✅ 小组"' + name + '"创建成功！邀请码：' + code);
      cancelGroupAdd();
      groups = await loadGroups();
      renderGroupList();
    } catch (err) {
      showToast('创建失败：' + (err.message || String(err)));
    }
  };

  window.confirmJoinGroup = async function() {
    const code = $('#groupJoinInput').value.trim().toUpperCase();
    if (!code) { showToast('请输入邀请码'); return; }
    try {
      const { data: found, error } = await supabase
        .from('groups')
        .select('id, name')
        .eq('invite_code', code);
      if (error) throw error;
      if (!found || found.length === 0) {
        showToast('❌ 邀请码无效，请检查'); return;
      }
      const group = found[0];

      // Check if already a member
      const { data: existing } = await supabase
        .from('group_members')
        .select('id')
        .eq('group_id', group.id)
        .eq('user_id', currentUser.id);
      if (existing && existing.length > 0) {
        showToast('你已经是该小组成员了'); return;
      }

      const nickname = currentUser.email ? currentUser.email.split('@')[0] : '成员';
      const { error: joinErr } = await supabase
        .from('group_members')
        .insert({ group_id: group.id, user_id: currentUser.id, role: 'member', nickname });
      if (joinErr) throw joinErr;

      showToast('🎉 已加入"' + group.name + '"！');
      cancelGroupJoin();
      groups = await loadGroups();
      renderGroupList();
    } catch (err) {
      showToast('加入失败：' + (err.message || String(err)));
    }
  };

  async function loadGroups() {
    const { data, error } = await supabase
      .from('groups')
      .select('*')
      .order('created_at', { ascending: true });
    if (error) { console.error('Failed to load groups:', error); return []; }
    if (data) {
      for (const g of data) {
        const { count: mCount } = await supabase
          .from('group_members')
          .select('*', { count: 'exact', head: true })
          .eq('group_id', g.id);
        g.memberCount = mCount || 0;
        const { count: fCount } = await supabase
          .from('friends')
          .select('*', { count: 'exact', head: true })
          .eq('group_id', g.id);
        g.friendCount = fCount || 0;
      }
    }
    return data || [];
  }

  window.quitGroup = async function() {
    if (!currentGroup) return;
    const isOwner = currentGroup.created_by === currentUser.id;
    const msg = isOwner
      ? '你是组长，退出将删除整个小组及其数据，确定吗？'
      : '确定要退出该小组吗？';
    if (!confirm(msg)) return;

    try {
      if (isOwner) {
        const { error } = await supabase.from('groups').delete().eq('id', currentGroup.id);
        if (error) throw error;
      } else {
        const { error } = await supabase
          .from('group_members')
          .delete()
          .eq('group_id', currentGroup.id)
          .eq('user_id', currentUser.id);
        if (error) throw error;
      }
      showToast(isOwner ? '小组已删除' : '已退出小组');
      currentGroup = null;
      currentGroupFriend = null;
      switchMainTab('groups');
    } catch (err) {
      showToast('操作失败：' + (err.message || String(err)));
    }
  };

  window.enterGroup = async function(groupId) {

      currentGroup = data;

  async function loadGroupDetail() {
    if (!currentGroup) return;
    // Fetch member count
    const { count: mCount } = await supabase
      .from('group_members')
      .select('*', { count: 'exact', head: true })
      .eq('group_id', currentGroup.id);
    currentGroup.memberCount = mCount || 0;

    groupFriends = await loadGroupFriends(currentGroup.id);

    // Switch view
    friendListView.classList.remove('active');
    detailView.classList.remove('active');
    groupListView.classList.remove('active');
    groupDetailView.classList.add('active');

    renderGroupDetail();
  }

  function renderGroupDetail() {
    if (!currentGroup) return;

    $('#groupDetailName').textContent = currentGroup.name;
    $('#groupInviteCode').textContent = currentGroup.invite_code || '--------';
    $('#groupMemberCount').textContent = (currentGroup.memberCount || 0) + ' 位成员';
    $('#groupQuitBtn').textContent = currentGroup.created_by === currentUser.id ? '删除小组' : '退出小组';

    const friendsEl = $('#groupFriendsList');
    if (!groupFriends || groupFriends.length === 0) {
      friendsEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-muted);">还没有添加朋友，点击下方按钮添加</div>';
    } else {
      friendsEl.innerHTML = groupFriends.map(f => {
        const avatarColor = AVATAR_COLORS[Math.abs(hashCode(f.name)) % AVATAR_COLORS.length];
        const emoji = getAvatarEmoji(f.name);
        const countText = f.foodCount ? f.foodCount + ' 种食物' : '暂无食物';
        const bgStyle = f.avatar_url
          ? `background: url(${escapeHtml(f.avatar_url)}) center/cover no-repeat; color: transparent;`
          : `background: ${avatarColor};`;
        return `
          <div class="group-friend-card" onclick="enterGroupFriend('${f.id}')">
            <div class="gf-avatar" style="${bgStyle}">${f.avatar_url ? '' : emoji}</div>
            <div class="gf-info">
              <div class="gf-name">${escapeHtml(f.name)}</div>
              <div class="gf-meta">
                <span>${countText}</span>
                <span class="contributor">${escapeHtml(f.contributor || '')}</span>
              </div>
            </div>
            <span class="gf-arrow">›</span>
          </div>
        `;
      }).join('');
    }
  }

  window.goBackToGroupList = function() {
    currentGroup = null;
    currentGroupFriend = null;
    groupDetailView.classList.remove('active');
    groupListView.classList.add('active');
    loadGroups().then(() => renderGroupList());
  };

  // ============================
  //  Group: Friend Functions
  // ============================
  window.showGroupAddFriendForm = function() {
    $('#groupAddFriendForm').classList.add('active');
    $('#groupAddFriendBtn').style.display = 'none';
    $('#groupAddFriendInput').focus();
  };
  window.cancelGroupAddFriend = function() {
    $('#groupAddFriendForm').classList.remove('active');
    $('#groupAddFriendBtn').style.display = '';
    $('#groupAddFriendInput').value = '';
  };

  window.confirmAddGroupFriend = async function() {
    const name = $('#groupAddFriendInput').value.trim();
    if (!name) { showToast('请输入朋友名字'); return; }
    if (!currentGroup) return;

    try {
      const { data, error } = await supabase
        .from('friends')
        .insert({ name, user_id: currentUser.id, group_id: currentGroup.id })
        .select()
        .single();
      if (error) throw error;

      showToast('✅ 已添加"' + name + '"到小组');
      cancelGroupAddFriend();
      groupFriends = await loadGroupFriends(currentGroup.id);
      renderGroupDetail();
    } catch (err) {
      showToast('添加失败：' + (err.message || String(err)));
    }
  };

  async function loadGroupFriends(groupId) {
    const { data, error } = await supabase
      .from('friends')
      .select('*')
      .eq('group_id', groupId)
      .order('created_at', { ascending: true });

    if (error) { console.error('Failed to load group friends:', error); return []; }
    if (data) {
      // Get all unique user_ids to build contributor map
      const userIds = [...new Set(data.map(f => f.user_id))];
      const contributorMap = {};
      if (userIds.length > 0) {
        const { data: members } = await supabase
          .from('group_members')
          .select('user_id, nickname')
          .eq('group_id', groupId);
        if (members) {
          members.forEach(m => { contributorMap[m.user_id] = m.nickname || m.user_id.slice(0, 8); });
        }
      }
      for (const f of data) {
        const { count } = await supabase
          .from('food_items')
          .select('*', { count: 'exact', head: true })
          .eq('friend_id', f.id);
        f.foodCount = count || 0;
        f.contributor = contributorMap[f.user_id] || f.user_id.slice(0, 8);
      }
    }
    return data || [];
  }

  window.enterGroupFriend = function(friendId) {
    const friend = groupFriends.find(f => f.id === friendId);
    if (!friend) return;
    currentGroupFriend = friend;
    switchToFriendDetail(friend, true);
  };

  // ============================
  //  Group: Edit Log
  // ============================
  async function logEdit(action, foodName, category, friendId, groupId) {
    if (!groupId) return;
    try {
      await supabase.from('edit_logs').insert({
        action, food_name: foodName, category,
        friend_id: friendId, group_id: groupId, user_id: currentUser.id
      });
    } catch (e) {
      console.error('Failed to log edit:', e);
    }
  }

  async function loadEditLogs(groupId, limit) {
    limit = limit || 50;
    const { data, error } = await supabase
      .from('edit_logs')
      .select('*')
      .eq('group_id', groupId)
      .order('performed_at', { ascending: false })
      .limit(limit);

    if (error) { console.error('Failed to load edit logs:', error); return []; }

    // Build user nickname map from group_members
    if (data && data.length > 0) {
      const { data: members } = await supabase
        .from('group_members')
        .select('user_id, nickname')
        .eq('group_id', groupId);
      const nicknameMap = {};
      if (members) members.forEach(m => { nicknameMap[m.user_id] = m.nickname || m.user_id.slice(0, 8); });
      for (const log of data) {
        log.nickname = nicknameMap[log.user_id] || log.user_id.slice(0, 8);
      }
    }
    return data || [];
  }

  function renderRelativeTime(ts) {
    if (!ts) return '';
    const now = new Date();
    const t = new Date(ts);
    const diffMs = now - t;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHour = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHour / 24);

    if (diffSec < 60) return '刚刚';
    if (diffMin < 60) return diffMin + '分钟前';
    if (diffHour < 24) return diffHour + '小时前';
    if (diffDay === 1) return '昨天 ' + t.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    if (diffDay < 7) return diffDay + '天前';
    return t.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) + ' ' +
           t.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  function renderEditLogs(logs) {
    const entriesEl = $('#editLogEntries');
    const emptyEl = $('#editLogEmpty');
    if (!logs || logs.length === 0) {
      entriesEl.innerHTML = '';
      emptyEl.style.display = '';
      return;
    }
    emptyEl.style.display = 'none';
    const catNames = { likes: '爱吃', dislikes: '不喜欢吃', allergies: '过敏' };

    entriesEl.innerHTML = logs.map(log => {
      const isAdd = log.action === 'add';
      const icon = isAdd ? '+' : '−';
      const cssClass = isAdd ? 'add' : 'delete';
      const actionText = isAdd ? '添加了' : '删除了';
      return `
        <div class="log-entry ${cssClass}">
          <div class="log-icon">${icon}</div>
          <div class="log-body">
            <div class="log-text">
              <strong>${escapeHtml(log.nickname || '')}</strong> ${actionText}
              "<strong>${escapeHtml(log.food_name)}</strong>"
              <span class="log-cat ${log.category}">${catNames[log.category] || log.category}</span>
            </div>
            <div class="log-meta">
              <span>${renderRelativeTime(log.performed_at)}</span>
              <span class="log-user">${escapeHtml(log.nickname || '')}</span>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  window.openEditLog = async function() {
    if (!currentGroup) return;
    editLogs = await loadEditLogs(currentGroup.id);
    renderEditLogs(editLogs);
    $('#editLogOverlay').classList.add('active');
  };

  window.closeEditLog = function(event) {
    if (event && event.target !== $('#editLogOverlay')) return;
    $('#editLogOverlay').classList.remove('active');
  };

  window.copyInviteCode = function() {
    if (!currentGroup || !currentGroup.invite_code) return;
    navigator.clipboard.writeText(currentGroup.invite_code).then(() => {
      showToast('📋 邀请码已复制！');
    }).catch(() => {
      showToast('复制失败，邀请码：' + currentGroup.invite_code);
    });
  };

  // ============================
  //  Group: Realtime
  // ============================
  function subscribeToGroupChanges() {
    if (groupRealtimeChannel) {
      supabase.removeChannel(groupRealtimeChannel);
    }
    groupRealtimeChannel = supabase
      .channel('group-changes')
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'food_items'
      }, async () => {
        if (currentGroup) {
          if (currentGroupFriend) {
            setSyncStatus(true);
            foodItems = await loadFoodItems(currentGroupFriend.id);
            renderAll();
            setTimeout(() => setSyncStatus(false), 600);
          }
          // Refresh group friends to update counts
          groupFriends = await loadGroupFriends(currentGroup.id);
          if (currentGroup && !currentGroupFriend) renderGroupDetail();
        }
      })
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'friends'
      }, async () => {
        if (currentGroup) {
          groupFriends = await loadGroupFriends(currentGroup.id);
          renderGroupDetail();
        }
        if (!currentGroup && !currentFriend) {
          friends = await loadFriends();
          renderFriendList();
        }
      })
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'group_members'
      }, async () => {
        if (currentGroup) {
          const { count } = await supabase
            .from('group_members')
            .select('*', { count: 'exact', head: true })
            .eq('group_id', currentGroup.id);
          currentGroup.memberCount = count || 0;
          renderGroupDetail();
        }
      })
      .on('postgres_changes', {
        event: '*', schema: 'public', table: 'edit_logs'
      }, async () => {
        if (currentGroup && $('#editLogOverlay').classList.contains('active')) {
          editLogs = await loadEditLogs(currentGroup.id);
          renderEditLogs(editLogs);
        }
      })
      .subscribe();
  }

  // ============================
  //  Group: Utility
  // ============================
  function getAvatarEmoji(name) {
    if (!name) return '😊';
    const map = {
      '小': '🌟', '大': '🎯', '老': '🧓', '阿': '🌸', '明': '🌞', '红': '🌹',
      '张': '📘', '李': '📗', '王': '📙', '赵': '📕', '刘': '📒', '陈': '📓'
    };
    for (const [k, v] of Object.entries(map)) {
      if (name.includes(k)) return v;
    }
    const emojis = ['😊','😄','🤗','🥰','😎','🧑','👧','👦','👩','👨','🌟','💫','🎈','🍀','🌸'];
    return emojis[Math.abs(hashCode(name)) % emojis.length];
  }

  function hashCode(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  init();
})();
</script>
